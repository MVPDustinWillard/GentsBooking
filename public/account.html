<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>My Account — Gents Barber Shop</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .logo{text-align:center;margin-bottom:28px}
    .logo-img{height:72px;width:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
    .logo-sub{font-size:12px;color:#888;letter-spacing:.8px;text-transform:uppercase}
    .user-badge{background:#f5f5f0;border-radius:10px;padding:14px 16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
    .user-avatar{width:40px;height:40px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .user-name{font-weight:700;font-size:15px}
    .user-role{font-size:12px;color:#888;text-transform:capitalize}
    .photo-section{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;gap:12px}
    .photo-preview{width:90px;height:90px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;border:3px solid #e4e4e4;position:relative}
    .photo-preview img{width:100%;height:100%;object-fit:cover}
    .photo-initials{font-size:28px;color:#fff;font-weight:700;line-height:1}
    .btn-photo{padding:8px 18px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
    .btn-photo:hover{background:#e0e0e0}
    .photo-hint{font-size:11px;color:#aaa}
    .alert-photo{border-radius:8px;padding:8px 12px;font-size:12px;display:none;text-align:center}
    .alert-photo.show{display:block}
    .alert-photo.error{background:#fef0f0;color:#c0392b}
    .alert-photo.success{background:#f0faf4;color:#1a7a4a}
    h2{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-bottom:6px}
    .field input{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;transition:border-color .15s}
    .field input:focus{outline:none;border-color:#8B1A1A}
    .hint{font-size:12px;color:#999;margin-top:4px}
    .btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;font-family:inherit}
    .btn-primary{background:#8B1A1A;color:#fff;margin-top:4px}
    .btn-primary:hover{background:#6d1414}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed}
    .alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
    .alert.show{display:block}
    .alert-error{background:#fef0f0;color:#c0392b;border:1px solid #f5c6c6}
    .alert-success{background:#f0faf4;color:#1a7a4a;border:1px solid #b0d8c0}
    .links{margin-top:20px;display:flex;gap:12px;justify-content:center}
    .links a{font-size:13px;color:#888;text-decoration:none}
    .links a:hover{color:#8B1A1A}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/images/gents/logo.png" alt="Gents Barber Shop" class="logo-img">
    <div class="logo-sub">My Account</div>
  </div>

  <div class="user-badge">
    <div class="user-avatar" id="badge-avatar"><img src="/images/gents/logo.png" alt="Gents" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>
    <div>
      <div class="user-name" id="user-name">Loading...</div>
      <div class="user-role" id="user-role"></div>
    </div>
  </div>

  <div class="photo-section">
    <div class="photo-preview" id="photo-preview"><span class="photo-initials" id="photo-initials">?</span></div>
    <div>
      <button class="btn-photo" onclick="document.getElementById('photo-input').click()">Change Photo</button>
      <input type="file" id="photo-input" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="uploadPhoto(this)">
    </div>
    <div class="photo-hint">JPG, PNG, GIF or WEBP · max 5 MB</div>
    <div class="alert-photo" id="photo-msg"></div>
  </div>

  <h2>Change Password</h2>

  <div class="alert alert-error"   id="err-msg"></div>
  <div class="alert alert-success" id="ok-msg"></div>

  <form onsubmit="changePassword(event)">
    <div class="field">
      <label>Current Password</label>
      <input type="password" id="cur-pw" required autocomplete="current-password">
    </div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="new-pw" required autocomplete="new-password" minlength="6">
      <div class="hint">Minimum 6 characters</div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="new-pw2" required autocomplete="new-password">
    </div>
    <button class="btn btn-primary" type="submit" id="btn-save">Update Password</button>
  </form>

  <div class="links">
    <a href="/admin.html">← Dashboard</a>
    <a href="/" >Booking page</a>
  </div>
</div>
<script>
async function init(){
  const r=await fetch('/api/auth/me');
  if(!r.ok){window.location.href='/login.html';return;}
  const me=await r.json();
  document.getElementById('user-name').textContent=me.name;
  document.getElementById('user-role').textContent=me.role==='admin'?'Administrator':'Barber';
  setAvatar(me.name, me.photo_url);
}
function setAvatar(name, photoUrl){
  const preview=document.getElementById('photo-preview');
  const badgeAv=document.getElementById('badge-avatar');
  const initials=name?name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
  document.getElementById('photo-initials').textContent=initials;
  if(photoUrl){
    preview.innerHTML=`<img src="${photoUrl}" alt="Profile photo">`;
    badgeAv.innerHTML=`<img src="${photoUrl}" alt="">`;
  } else {
    preview.innerHTML=`<span class="photo-initials">${initials}</span>`;
    badgeAv.innerHTML=`<span style="color:#fff;font-weight:700">${initials}</span>`;
  }
}
async function uploadPhoto(input){
  const file=input.files[0]; if(!file) return;
  const msgEl=document.getElementById('photo-msg');
  msgEl.className='alert-photo'; msgEl.classList.remove('show');
  const fd=new FormData(); fd.append('photo',file);
  try{
    const res=await fetch('/api/auth/upload-photo',{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error);
    setAvatar(document.getElementById('user-name').textContent, data.photo_url);
    msgEl.textContent='Photo updated!'; msgEl.classList.add('show','success');
    setTimeout(()=>msgEl.classList.remove('show'),3000);
  }catch(e){
    msgEl.textContent=e.message; msgEl.classList.add('show','error');
  }
  input.value='';
}
async function changePassword(e){
  e.preventDefault();
  const cur=document.getElementById('cur-pw').value;
  const np=document.getElementById('new-pw').value;
  const np2=document.getElementById('new-pw2').value;
  const errEl=document.getElementById('err-msg');
  const okEl=document.getElementById('ok-msg');
  errEl.classList.remove('show'); okEl.classList.remove('show');
  if(np!==np2){errEl.textContent='New passwords do not match.';errEl.classList.add('show');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Saving...';
  try{
    const res=await fetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:cur,new_password:np})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error);
    okEl.textContent='Password updated successfully!';okEl.classList.add('show');
    document.getElementById('cur-pw').value='';
    document.getElementById('new-pw').value='';
    document.getElementById('new-pw2').value='';
  }catch(err){errEl.textContent=err.message;errEl.classList.add('show');}
  btn.disabled=false; btn.textContent='Update Password';
}
init();
</script>
</body>
</html>
